<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{business/base}">
<head>
    <meta charset="UTF-8">
    <title>A147 Business</title>
</head>
<body>

<div layout:fragment="content">
    <form th:action="@{/business/clients/create}" th:object="${form}" method="post">
        <input type="text" th:field="*{nombre}" placeholder="Nombre">
        <div th:errors="*{nombre}"></div>

        <label>
            <input type="checkbox" th:field="*{empresa}" id="empresaToggle">
            ¿Es una empresa?
        </label>

        <section id="form-empresa">
            <input type="text" th:field="*{empresaForm.ruc}" placeholder="RUC">
            <div th:errors="*{empresaForm.ruc}"></div>
        </section>

        <button type="submit">Registrar</button>
    </form>
</div>

</body>
</html>
