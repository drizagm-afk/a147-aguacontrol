<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{auth/base}">
<head>
    <meta charset="UTF-8">
    <title>A147</title>
    <th:block layout:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/auth/login.css}">
    </th:block>
</head>
<body>

<div layout:fragment="content">
    <form id="form" th:action="@{/login}" method="post">
        <h2 id="form-title">Panel de Administración</h2>
        <p id="form-subtitle">Ingrese sus credenciales para continuar</p>

        <div th:if="${param.error}" class="alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            Usuario o contraseña incorrectos
        </div>


        <div id="form-content">
            <!--USERNAME-->
            <div class="form-field">
                <i class="bi bi-envelope"></i>
                <input type="text" name="identifier" placeholder="Username o Email" required>
            </div>

            <!--PASSWORD-->
            <div class="form-field">
                <i class="bi bi-lock"></i>
                <input id="password" type="password" name="password" placeholder="Contraseña" required>
                <i id="eye-icon" class="bi bi-eye"></i>
            </div>

            <button type="submit">Iniciar Sesión</button>
        </div>

        <p class="footer">¿Aun no tiene cuenta? <a th:href="@{/signup}">Registrese Aquí</a></p>
    </form>
</div>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/auth/login.js}"></script>
</th:block>

</body>
</html>
